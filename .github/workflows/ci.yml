name: CI - Train Model & Build Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn==1.3.2 pandas==2.1.4

      - name: Run MLflow Project (Train Model)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name=iris_classification

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: MLProject
        run: |
          docker build -t rifan75/iris_classification:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push rifan75/iris_classification:latest
