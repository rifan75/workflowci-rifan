name: CI - Train Model & Build Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install mlflow==2.10.0 scikit-learn==1.3.2 pandas==2.1.4

      - name: Run MLflow Project (Train Model)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image with MLflow
        working-directory: MLProject
        run: |
          # Get the latest run_id
          RUN_ID=$(ls -t mlruns/*/meta.yaml 2>/dev/null | head -1 | xargs grep run_id | awk '{print $2}' || true)
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(find mlruns -name "meta.yaml" -path "*/[!e]*/*" | head -1 | xargs grep "run_id" | awk '{print $2}')
          fi
          mlflow models build-docker -m "mlruns/1/$RUN_ID/artifacts/model" -n "rifanbaihaqie/iris_classification" --enable-mlserver

      - name: Push Docker Image to Docker Hub
        run: |
          docker push rifanbaihaqie/iris_classification:latest
